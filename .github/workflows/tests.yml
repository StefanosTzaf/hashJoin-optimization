name: Run Tests

on:
  push:
    branches: 
      - "main"
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -Wno-dev

    - name: Build
      run: cmake --build build -- -j $(nproc) fast

    - name: unit_tests
      run: | 
        ./build/unit_tests
        ./build/unit_tests_columnStore
        ./build/unit_tests_unchained
